apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: hoppingmall
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service-canary
  namespace: hoppingmall
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
