apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: hoppingmall
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8085
      targetPort: 8085
    - name: grpc
      port: 9095
      targetPort: 9095
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service-canary
  namespace: hoppingmall
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8085
      targetPort: 8085
    - name: grpc
      port: 9095
      targetPort: 9095
