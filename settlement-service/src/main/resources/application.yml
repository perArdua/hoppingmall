spring:
  application:
    name: settlement-service

  jackson:
    property-naming-strategy: SNAKE_CASE

  datasource:
    url: jdbc:h2:mem:settlement_db;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: true

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: settlement-service
  tracing:
    sampling:
      probability: 0.0
    enabled: false

jwt:
  secret: ${JWT_SECRET:default-docker-secret-key-for-development-only-32chars!}

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-2026}

services:
  order-service:
    url: http://localhost:8084
  user-service:
    url: http://localhost:8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
