spring:
  datasource:
    url: jdbc:h2:mem:test_settlement_db;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

jwt:
  secret: test-secret-key-for-testing-purposes-only-32chars!

internal:
  service:
    token: test-internal-token

services:
  order-service:
    url: http://localhost:8084
  user-service:
    url: http://localhost:8082

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 2
    configs:
      settlement:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 2
        slowCallDurationThreshold: 8s
        recordExceptions:
          - java.lang.Exception
    instances:
      order-item-query:
        baseConfig: settlement
      refund-query:
        baseConfig: settlement
      seller-query:
        baseConfig: settlement
  retry:
    retryAspectOrder: 1
    configs:
      settlement:
        maxAttempts: 1
        retryExceptions:
          - java.io.IOException
    instances:
      order-item-query:
        baseConfig: settlement
      refund-query:
        baseConfig: settlement
      seller-query:
        baseConfig: settlement
