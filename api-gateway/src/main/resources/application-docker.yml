spring:
  cloud:
    gateway:
      routes:
        - id: user-service-public
          uri: http://user-service:8082
          predicates:
            - Path=/api/v1/users/signup,/api/v1/users/login,/api/v1/auth/refresh

        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/v1/users/**,/api/v1/auth/**,/api/v1/sellers/**,/api/v1/admin/**,/api/v1/memberships/**
          filters:
            - JwtValidation

        - id: notification-service
          uri: http://notification-service:8081
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - JwtValidation

        - id: product-service-products
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: JwtValidation

        - id: product-service-categories
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/categories/**
          filters:
            - name: JwtValidation

        - id: product-service-inventory
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - name: JwtValidation

        - id: product-service-reviews
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/reviews/**
          filters:
            - name: JwtValidation

        - id: product-service-wishlists
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/wishlists/**
          filters:
            - name: JwtValidation

        - id: product-service-statistics
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/statistics/**
          filters:
            - name: JwtValidation

        - id: product-service-dashboard
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/seller/dashboard/**
          filters:
            - name: JwtValidation

        - id: monolith-public
          uri: http://monolith:8080
          predicates:
            - Path=/api/v1/point-policies/**,/api/v1/coupons/*/availability
            - Method=GET

        - id: monolith
          uri: http://monolith:8080
          predicates:
            - Path=/api/v1/**
          filters:
            - JwtValidation

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    root: INFO
    com.hoppingmall: INFO
    org.springframework.cloud.gateway: INFO
