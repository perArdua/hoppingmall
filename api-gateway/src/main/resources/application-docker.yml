springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    urls:
      - name: user-service
        url: /v3/api-docs/user-service
      - name: product-service
        url: /v3/api-docs/product-service
      - name: order-service
        url: /v3/api-docs/order-service
      - name: payment-service
        url: /v3/api-docs/payment-service
      - name: settlement-service
        url: /v3/api-docs/settlement-service
      - name: notification-service
        url: /v3/api-docs/notification-service

spring:
  data:
    redis:
      host: redis-node-1
      port: 7001
      cluster:
        nodes:
          - redis-node-1:7001
          - redis-node-2:7002
          - redis-node-3:7003

  cloud:
    gateway:
      routes:
        - id: user-service-api-docs
          uri: http://user-service:8082
          predicates:
            - Path=/v3/api-docs/user-service
          filters:
            - RewritePath=/v3/api-docs/user-service, /v3/api-docs

        - id: product-service-api-docs
          uri: http://product-service:8083
          predicates:
            - Path=/v3/api-docs/product-service
          filters:
            - RewritePath=/v3/api-docs/product-service, /v3/api-docs

        - id: order-service-api-docs
          uri: http://order-service:8084
          predicates:
            - Path=/v3/api-docs/order-service
          filters:
            - RewritePath=/v3/api-docs/order-service, /v3/api-docs

        - id: payment-service-api-docs
          uri: http://payment-service:8085
          predicates:
            - Path=/v3/api-docs/payment-service
          filters:
            - RewritePath=/v3/api-docs/payment-service, /v3/api-docs

        - id: settlement-service-api-docs
          uri: http://settlement-service:8086
          predicates:
            - Path=/v3/api-docs/settlement-service
          filters:
            - RewritePath=/v3/api-docs/settlement-service, /v3/api-docs

        - id: notification-service-api-docs
          uri: http://notification-service:8081
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - RewritePath=/v3/api-docs/notification-service, /v3/api-docs

        - id: user-service-public
          uri: http://user-service:8082
          predicates:
            - Path=/api/v1/users/signup,/api/v1/users/login,/api/v1/auth/refresh

        - id: product-service-statistics
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/admin/product-statistics/**
          filters:
            - name: JwtValidation

        - id: payment-service-admin-coupons
          uri: http://payment-service:8085
          predicates:
            - Path=/api/v1/admin/coupons/**
          filters:
            - name: JwtValidation

        - id: settlement-service-admin-settlements
          uri: http://settlement-service:8086
          predicates:
            - Path=/api/v1/admin/settlements/**
          filters:
            - JwtValidation

        - id: payment-service-admin-dlq
          uri: http://payment-service:8085
          predicates:
            - Path=/api/v1/admin/dlq/**
          filters:
            - JwtValidation

        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/v1/users/**,/api/v1/auth/**,/api/v1/sellers/**,/api/v1/admin/sellers/**,/api/v1/memberships/**
          filters:
            - JwtValidation

        - id: notification-service
          uri: http://notification-service:8081
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - JwtValidation

        - id: product-service-products
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: JwtValidation

        - id: product-service-categories
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/categories/**
          filters:
            - name: JwtValidation

        - id: product-service-inventories
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/inventories/**
          filters:
            - name: JwtValidation

        - id: product-service-reviews
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/reviews/**
          filters:
            - name: JwtValidation

        - id: product-service-wishlists
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/wishlists/**
          filters:
            - name: JwtValidation

        - id: product-service-dashboard
          uri: http://product-service:8083
          predicates:
            - Path=/api/v1/seller/dashboard/**
          filters:
            - name: JwtValidation

        - id: settlement-service-seller-settlements
          uri: http://settlement-service:8086
          predicates:
            - Path=/api/v1/seller/settlements/**
          filters:
            - JwtValidation

        - id: order-service-orders
          uri: http://order-service:8084
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - name: JwtValidation

        - id: order-service-cart-items
          uri: http://order-service:8084
          predicates:
            - Path=/api/v1/cart-items/**
          filters:
            - name: JwtValidation

        - id: order-service-shipping
          uri: http://order-service:8084
          predicates:
            - Path=/api/v1/shipping/**
          filters:
            - name: JwtValidation

        - id: order-service-refunds
          uri: http://order-service:8084
          predicates:
            - Path=/api/v1/refunds/**
          filters:
            - name: JwtValidation

        - id: payment-service-payments
          uri: http://payment-service:8085
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: JwtValidation

        - id: payment-service-points
          uri: http://payment-service:8085
          predicates:
            - Path=/api/v1/points/**
          filters:
            - name: JwtValidation

        - id: payment-service-point-policies
          uri: http://payment-service:8085
          predicates:
            - Path=/api/v1/point-policies/**
          filters:
            - name: JwtValidation

        - id: payment-service-coupons
          uri: http://payment-service:8085
          predicates:
            - Path=/api/v1/coupons/**
          filters:
            - name: JwtValidation

management:
  metrics:
    tags:
      application: api-gateway
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces

logging:
  level:
    root: INFO
    com.hoppingmall: INFO
    org.springframework.cloud.gateway: INFO
