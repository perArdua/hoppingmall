spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 40
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@userKeyResolver}"
            deny-empty-key: false
      routes:
        - id: user-service-public
          uri: ${ROUTES_USER_SERVICE:http://localhost:8082}
          predicates:
            - Path=/api/v1/users/signup,/api/v1/users/login,/api/v1/auth/refresh

        - id: product-service-statistics
          uri: ${ROUTES_PRODUCT_SERVICE:http://localhost:8083}
          predicates:
            - Path=/api/v1/admin/product-statistics/**
          filters:
            - name: JwtValidation

        - id: payment-service-admin-coupons
          uri: ${ROUTES_PAYMENT_SERVICE:http://localhost:8085}
          predicates:
            - Path=/api/v1/admin/coupons/**
          filters:
            - name: JwtValidation

        - id: settlement-service-admin-settlements
          uri: ${ROUTES_SETTLEMENT_SERVICE:http://localhost:8086}
          predicates:
            - Path=/api/v1/admin/settlements/**
          filters:
            - JwtValidation

        - id: monolith-admin-dlq
          uri: ${ROUTES_MONOLITH:http://localhost:8080}
          predicates:
            - Path=/api/v1/admin/dlq/**
          filters:
            - JwtValidation

        - id: user-service
          uri: ${ROUTES_USER_SERVICE:http://localhost:8082}
          predicates:
            - Path=/api/v1/users/**,/api/v1/auth/**,/api/v1/sellers/**,/api/v1/admin/sellers/**,/api/v1/memberships/**
          filters:
            - JwtValidation

        - id: notification-service
          uri: ${ROUTES_NOTIFICATION_SERVICE:http://localhost:8081}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - JwtValidation

        - id: product-service-products
          uri: ${ROUTES_PRODUCT_SERVICE:http://localhost:8083}
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: JwtValidation

        - id: product-service-categories
          uri: ${ROUTES_PRODUCT_SERVICE:http://localhost:8083}
          predicates:
            - Path=/api/v1/categories/**
          filters:
            - name: JwtValidation

        - id: product-service-inventories
          uri: ${ROUTES_PRODUCT_SERVICE:http://localhost:8083}
          predicates:
            - Path=/api/v1/inventories/**
          filters:
            - name: JwtValidation

        - id: product-service-reviews
          uri: ${ROUTES_PRODUCT_SERVICE:http://localhost:8083}
          predicates:
            - Path=/api/v1/reviews/**
          filters:
            - name: JwtValidation

        - id: product-service-wishlists
          uri: ${ROUTES_PRODUCT_SERVICE:http://localhost:8083}
          predicates:
            - Path=/api/v1/wishlists/**
          filters:
            - name: JwtValidation

        - id: product-service-dashboard
          uri: ${ROUTES_PRODUCT_SERVICE:http://localhost:8083}
          predicates:
            - Path=/api/v1/seller/dashboard/**
          filters:
            - name: JwtValidation

        - id: settlement-service-seller-settlements
          uri: ${ROUTES_SETTLEMENT_SERVICE:http://localhost:8086}
          predicates:
            - Path=/api/v1/seller/settlements/**
          filters:
            - JwtValidation

        - id: order-service-orders
          uri: ${ROUTES_ORDER_SERVICE:http://localhost:8084}
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - name: JwtValidation

        - id: order-service-cart-items
          uri: ${ROUTES_ORDER_SERVICE:http://localhost:8084}
          predicates:
            - Path=/api/v1/cart-items/**
          filters:
            - name: JwtValidation

        - id: order-service-shipping
          uri: ${ROUTES_ORDER_SERVICE:http://localhost:8084}
          predicates:
            - Path=/api/v1/shipping/**
          filters:
            - name: JwtValidation

        - id: order-service-refunds
          uri: ${ROUTES_ORDER_SERVICE:http://localhost:8084}
          predicates:
            - Path=/api/v1/refunds/**
          filters:
            - name: JwtValidation

        - id: payment-service-payments
          uri: ${ROUTES_PAYMENT_SERVICE:http://localhost:8085}
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: JwtValidation

        - id: payment-service-points
          uri: ${ROUTES_PAYMENT_SERVICE:http://localhost:8085}
          predicates:
            - Path=/api/v1/points/**
          filters:
            - name: JwtValidation

        - id: payment-service-point-policies
          uri: ${ROUTES_PAYMENT_SERVICE:http://localhost:8085}
          predicates:
            - Path=/api/v1/point-policies/**
          filters:
            - name: JwtValidation

        - id: payment-service-coupons
          uri: ${ROUTES_PAYMENT_SERVICE:http://localhost:8085}
          predicates:
            - Path=/api/v1/coupons/**
          filters:
            - name: JwtValidation

server:
  port: 8000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,gateway
  tracing:
    sampling:
      probability: 0.0
    enabled: false
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
