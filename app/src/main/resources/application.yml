spring:
  application:
    name: monolith

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    property-naming-strategy: SNAKE_CASE

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        legacy_id_generator_strategy: true
        default_batch_fetch_size: 100

  data:
    redis:
      redisson:
        config: |
          clusterServersConfig:
            nodeAddresses:
              - "redis://localhost:7001"
              - "redis://localhost:7002"
              - "redis://localhost:7003"
            scanInterval: 1000

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: hoppingmall-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      concurrency: 4

# DLQ 설정
kafka:
  topics:
    payment: payment
    payment.dlq: payment.dlq
    order: order
    order.dlq: order.dlq
    notification: notification
    notification.dlq: notification.dlq
  dlq:
    retry-count: 3
    retry-interval: 1000
    enable-alerts: true

  devtools:
    restart:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: hoppingmall
  tracing:
    sampling:
      probability: 0.0
    enabled: false
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

cors:
  allowed-origins:
    - http://localhost:3000
  allowed-methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true
  max-age: 3600

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.schema: debug
    org.hibernate.tool.hbm2ddl: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

file:
  upload:
    base-upload-dir: D:/hoppingmall
    max-file-size: 5242880 # 5MB
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - webp
    allowed-domains:
      - product
    sub-directory: images

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-2026}
