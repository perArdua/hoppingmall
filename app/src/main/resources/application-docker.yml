spring:
  datasource:
    url: jdbc:mysql://mysql:3306/monolith_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        show_sql: false

  data:
    redis:
      redisson:
        config: |
          clusterServersConfig:
            nodeAddresses:
              - "redis://redis-node-1:7001"
              - "redis://redis-node-2:7002"
              - "redis://redis-node-3:7003"
            scanInterval: 1000

  kafka:
    bootstrap-servers: kafka:29092

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    root: INFO
    com.hoppingmall: INFO
    org.hibernate.SQL: WARN

jwt:
  secret: ${JWT_SECRET:default-docker-secret-key-for-development-only-32chars!}
  access-expiration-ms: 3600000
  refresh-expiration-ms: 86400000

file:
  upload:
    base-upload-dir: /app/uploads
    max-file-size: 5242880
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - webp
    allowed-domains:
      - product
    sub-directory: images
