spring:
  application:
    name: order-service

  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        legacy_id_generator_strategy: true
        default_batch_fetch_size: 100

  jackson:
    property-naming-strategy: SNAKE_CASE

  data:
    redis:
      redisson:
        config: |
          clusterServersConfig:
            nodeAddresses:
              - "redis://localhost:7001"
              - "redis://localhost:7002"
              - "redis://localhost:7003"
            scanInterval: 1000

  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8084
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: order-service
  tracing:
    sampling:
      probability: 0.0
    enabled: false
  health:
    circuitbreakers:
      enabled: true

services:
  payment-service:
    url: http://localhost:8085
  product-service:
    url: http://localhost:8083

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-2026}

grpc:
  server:
    port: 9094
  client:
    product-service:
      address: static://localhost:9093
      negotiation-type: plaintext
    payment-service:
      address: static://localhost:9095
      negotiation-type: plaintext

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 2
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 80
        recordExceptions:
          - java.lang.Exception
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException$NotFound
          - org.springframework.web.client.HttpClientErrorException$BadRequest
    instances:
      product-query:
        baseConfig: default
      payment-query:
        baseConfig: default
      inventory-command:
        baseConfig: default
  retry:
    retryAspectOrder: 1
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
      grpc:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - io.grpc.StatusRuntimeException
          - java.io.IOException
    instances:
      product-query:
        baseConfig: default
      payment-query:
        baseConfig: default

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
