spring:
  datasource:
    url: jdbc:mysql://mysql:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      redisson:
        config: |
          clusterServersConfig:
            nodeAddresses:
              - "redis://redis-node-1:7001"
              - "redis://redis-node-2:7002"
              - "redis://redis-node-3:7003"
            scanInterval: 1000

  kafka:
    consumer:
      bootstrap-servers: kafka:29092
    producer:
      bootstrap-servers: kafka:29092

management:
  tracing:
    sampling:
      probability: 1.0
    enabled: true
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

services:
  payment-service:
    url: http://payment-service:8085
  product-service:
    url: http://product-service:8083

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN}

grpc:
  client:
    product-service:
      address: static://product-service:9093
      negotiation-type: plaintext
    payment-service:
      address: static://payment-service:9095
      negotiation-type: plaintext
