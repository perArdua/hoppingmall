apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: hoppingmall
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'monolith'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['monolith.hoppingmall.svc.cluster.local:8080']
            labels:
              service: 'monolith'

      - job_name: 'notification-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['notification-service.hoppingmall.svc.cluster.local:8081']
            labels:
              service: 'notification-service'

      - job_name: 'user-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['user-service.hoppingmall.svc.cluster.local:8082']
            labels:
              service: 'user-service'

      - job_name: 'product-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['product-service.hoppingmall.svc.cluster.local:8083']
            labels:
              service: 'product-service'

      - job_name: 'order-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['order-service.hoppingmall.svc.cluster.local:8084']
            labels:
              service: 'order-service'

      - job_name: 'payment-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['payment-service.hoppingmall.svc.cluster.local:8085']
            labels:
              service: 'payment-service'

      - job_name: 'settlement-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['settlement-service.hoppingmall.svc.cluster.local:8086']
            labels:
              service: 'settlement-service'

      - job_name: 'api-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['api-gateway.hoppingmall.svc.cluster.local:8000']
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: hoppingmall
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: hoppingmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}
