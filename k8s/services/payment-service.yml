apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: hoppingmall
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8085
      targetPort: 8085
    - name: grpc
      port: 9095
      targetPort: 9095
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: hoppingmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
            - containerPort: 9095
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s,grpc"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hoppingmall-secret
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hoppingmall-secret
                  key: INTERNAL_SERVICE_TOKEN
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hoppingmall-secret
                  key: MYSQL_ROOT_PASSWORD
          envFrom:
            - configMapRef:
                name: hoppingmall-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "1536Mi"
              cpu: "2000m"
