apiVersion: v1
kind: Service
metadata:
  name: monolith
  namespace: hoppingmall
spec:
  selector:
    app: monolith
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9080
      targetPort: 9080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith
  namespace: hoppingmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monolith
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: monolith
    spec:
      containers:
        - name: monolith
          image: monolith:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 9080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s,grpc"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+UseSerialGC"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hoppingmall-secret
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hoppingmall-secret
                  key: INTERNAL_SERVICE_TOKEN
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hoppingmall-secret
                  key: MYSQL_ROOT_PASSWORD
          envFrom:
            - configMapRef:
                name: hoppingmall-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "384Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
