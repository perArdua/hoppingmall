spring:
  application:
    name: product-service

  datasource:
    url: jdbc:h2:mem:productdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        legacy_id_generator_strategy: true
        default_batch_fetch_size: 100

  jackson:
    property-naming-strategy: SNAKE_CASE

  data:
    redis:
      redisson:
        config: |
          clusterServersConfig:
            nodeAddresses:
              - "redis://localhost:7001"
              - "redis://localhost:7002"
              - "redis://localhost:7003"
            scanInterval: 1000

  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: product-service
  tracing:
    sampling:
      probability: 0.0
    enabled: false
  health:
    circuitbreakers:
      enabled: true

services:
  order-service:
    url: http://localhost:8084

file:
  upload:
    base-upload-dir: ${FILE_UPLOAD_BASE_DIR:/tmp/hoppingmall}
    max-file-size: 5242880
    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - webp
    allowed-domains:
      - product
    sub-directory: images

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-2026}

grpc:
  server:
    port: 9093
  client:
    order-service:
      address: static://localhost:9094
      negotiation-type: plaintext

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 2
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 80
        recordExceptions:
          - java.lang.Exception
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException$NotFound
          - org.springframework.web.client.HttpClientErrorException$BadRequest
    instances:
      order-query:
        baseConfig: default
      cart-query:
        baseConfig: default
      order-item-query:
        baseConfig: default
  retry:
    retryAspectOrder: 1
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
      grpc:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - io.grpc.StatusRuntimeException
          - java.io.IOException
    instances:
      order-query:
        baseConfig: default
      cart-query:
        baseConfig: default
      order-item-query:
        baseConfig: default

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
