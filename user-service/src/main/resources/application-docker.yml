spring:
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: membership-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  datasource:
    url: jdbc:mysql://mysql:3306/user_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
  data:
    redis:
      redisson:
        config: |
          clusterServersConfig:
            nodeAddresses:
              - "redis://redis-node-1:7001"
              - "redis://redis-node-2:7002"
              - "redis://redis-node-3:7003"
            scanInterval: 1000

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token-2026}

logging:
  level:
    root: INFO
    com.hoppingmall: INFO
