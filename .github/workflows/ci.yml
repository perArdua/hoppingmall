name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  monolith-test:
    name: Monolith 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: gradlew에 실행 권한 부여
        run: chmod +x ./gradlew

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 테스트 및 커버리지 검증
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification --no-daemon --build-cache --quiet

      - name: 커버리지 업로드
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests

  services-test:
    name: ${{ matrix.service }} 테스트
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - notification-service
          - order-service
          - payment-service
          - product-service
          - user-service

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: gradlew에 실행 권한 부여
        run: chmod +x ./${{ matrix.service }}/gradlew

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 테스트
        run: cd ${{ matrix.service }} && ./gradlew test --no-daemon --build-cache

      - name: 테스트 리포트 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-report
          path: ${{ matrix.service }}/build/reports/tests/test/

  services-docker-build:
    name: ${{ matrix.service }} Docker 빌드
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - notification-service
          - order-service
          - payment-service
          - product-service
          - user-service

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: Docker 빌드 검증
        run: docker build -t ${{ matrix.service }}:ci-test ./${{ matrix.service }}
