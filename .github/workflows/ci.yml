name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  monolith-test:
    name: Monolith 테스트
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: gradlew에 실행 권한 부여
        run: chmod +x ./gradlew

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 테스트 및 커버리지 검증
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification --no-daemon --build-cache --quiet

      - name: 커버리지 업로드
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests

  services-test:
    name: ${{ matrix.service }} 테스트
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - notification-service
          - order-service
          - payment-service
          - product-service
          - settlement-service
          - user-service

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: gradlew에 실행 권한 부여
        run: chmod +x ./${{ matrix.service }}/gradlew

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 테스트
        run: cd ${{ matrix.service }} && ./gradlew test --no-daemon --build-cache

      - name: 테스트 리포트 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-report
          path: ${{ matrix.service }}/build/reports/tests/test/

  services-docker-build:
    name: ${{ matrix.service }} Docker 빌드
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - notification-service
          - order-service
          - payment-service
          - product-service
          - settlement-service
          - user-service

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: Docker 빌드 검증
        run: docker build -t ${{ matrix.service }}:ci-test ./${{ matrix.service }}

  k8s-validate:
    name: K8s 매니페스트 검증
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: kubectl 설치
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: kubeconform 설치
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: K8s 매니페스트 검증
        run: |
          find k8s -name '*.yml' -o -name '*.yaml' | while read f; do
            echo "Validating $f..."
            kubeconform -strict -summary "$f" || exit 1
          done

  final-check:
    name: CI 최종 검증
    runs-on: ubuntu-latest
    needs:
      - monolith-test
      - services-test
      - services-docker-build
      - k8s-validate
    if: always()
    steps:
      - name: 모든 선행 job 결과 확인
        run: |
          echo "monolith-test=${{ needs.monolith-test.result }}"
          echo "services-test=${{ needs.services-test.result }}"
          echo "services-docker-build=${{ needs.services-docker-build.result }}"
          echo "k8s-validate=${{ needs.k8s-validate.result }}"

          if [ "${{ needs.monolith-test.result }}" != "success" ]; then
            exit 1
          fi

          if [ "${{ needs.services-test.result }}" != "success" ]; then
            exit 1
          fi

          if [ "${{ needs.services-docker-build.result }}" != "success" ]; then
            exit 1
          fi

          if [ "${{ needs.k8s-validate.result }}" != "success" ]; then
            exit 1
          fi
