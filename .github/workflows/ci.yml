name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      #      - name: applicaion_local 디코딩 후 파일에 넣기
      #        run: |
      #          echo "${{ secrets.APPLICATION_LOCAL_BASE64 }}" | base64 -d > ./src/main/resources/application-local.yml

      - name: gradlew에 실행 권한 부여
        run: chmod +x ./gradlew

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 테스트 및 커버리지 검증
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification --no-daemon --build-cache --quiet

      - name: 커버리지 업로드
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
