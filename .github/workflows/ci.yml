name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: 변경 범위 감지
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.matrices.outputs.run_tests }}
      run_docker: ${{ steps.matrices.outputs.run_docker }}
      run_k8s: ${{ steps.matrices.outputs.run_k8s }}
      run_shared_modules: ${{ steps.matrices.outputs.run_shared_modules }}
      test_matrix: ${{ steps.matrices.outputs.test_matrix }}
      docker_matrix: ${{ steps.matrices.outputs.docker_matrix }}
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 변경 파일 필터링
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api_gateway:
              - 'api-gateway/**'
              - '.github/workflows/**'
            notification_service:
              - 'notification-service/**'
              - 'hoppingmall-common/**'
              - 'hoppingmall-dlq/**'
              - '.github/workflows/**'
            order_service:
              - 'order-service/**'
              - 'hoppingmall-common/**'
              - 'hoppingmall-idempotency/**'
              - 'hoppingmall-dlq/**'
              - 'hoppingmall-outbox/**'
              - '.github/workflows/**'
            payment_service:
              - 'payment-service/**'
              - 'hoppingmall-common/**'
              - 'hoppingmall-dlq/**'
              - 'hoppingmall-outbox/**'
              - '.github/workflows/**'
            product_service:
              - 'product-service/**'
              - 'hoppingmall-common/**'
              - 'hoppingmall-idempotency/**'
              - 'hoppingmall-cache/**'
              - 'hoppingmall-dlq/**'
              - '.github/workflows/**'
            settlement_service:
              - 'settlement-service/**'
              - 'hoppingmall-common/**'
              - '.github/workflows/**'
            user_service:
              - 'user-service/**'
              - 'hoppingmall-common/**'
              - 'hoppingmall-dlq/**'
              - '.github/workflows/**'
            k8s:
              - 'k8s/**'
              - 'k8s-cd/**'
            shared_modules:
              - 'hoppingmall-common/**'
              - 'hoppingmall-cache/**'
              - 'hoppingmall-dlq/**'
              - 'hoppingmall-idempotency/**'
              - 'hoppingmall-outbox/**'

      - name: 실행 매트릭스 생성
        id: matrices
        env:
          EVENT_NAME: ${{ github.event_name }}
          API_GATEWAY: ${{ steps.changes.outputs.api_gateway }}
          NOTIFICATION_SERVICE: ${{ steps.changes.outputs.notification_service }}
          ORDER_SERVICE: ${{ steps.changes.outputs.order_service }}
          PAYMENT_SERVICE: ${{ steps.changes.outputs.payment_service }}
          PRODUCT_SERVICE: ${{ steps.changes.outputs.product_service }}
          SETTLEMENT_SERVICE: ${{ steps.changes.outputs.settlement_service }}
          USER_SERVICE: ${{ steps.changes.outputs.user_service }}
          K8S_CHANGED: ${{ steps.changes.outputs.k8s }}
          SHARED_MODULES: ${{ steps.changes.outputs.shared_modules }}
        run: |
          impacted_services=()

          if [[ "$API_GATEWAY" == "true" ]]; then
            impacted_services+=('"api-gateway"')
          fi
          if [[ "$NOTIFICATION_SERVICE" == "true" ]]; then
            impacted_services+=('"notification-service"')
          fi
          if [[ "$ORDER_SERVICE" == "true" ]]; then
            impacted_services+=('"order-service"')
          fi
          if [[ "$PAYMENT_SERVICE" == "true" ]]; then
            impacted_services+=('"payment-service"')
          fi
          if [[ "$PRODUCT_SERVICE" == "true" ]]; then
            impacted_services+=('"product-service"')
          fi
          if [[ "$SETTLEMENT_SERVICE" == "true" ]]; then
            impacted_services+=('"settlement-service"')
          fi
          if [[ "$USER_SERVICE" == "true" ]]; then
            impacted_services+=('"user-service"')
          fi

          if ((${#impacted_services[@]} > 0)); then
            impacted_joined=$(IFS=,; echo "${impacted_services[*]}")
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_matrix={\"service\":[${impacted_joined}]}" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo 'test_matrix={"service":[]}' >> "$GITHUB_OUTPUT"
          fi

          all_services='"api-gateway","notification-service","order-service","payment-service","product-service","settlement-service","user-service"'

          if [[ "$EVENT_NAME" == "push" ]]; then
            echo "run_docker=true" >> "$GITHUB_OUTPUT"
            echo "docker_matrix={\"service\":[${all_services}]}" >> "$GITHUB_OUTPUT"
          elif ((${#impacted_services[@]} > 0)); then
            echo "run_docker=true" >> "$GITHUB_OUTPUT"
            echo "docker_matrix={\"service\":[${impacted_joined}]}" >> "$GITHUB_OUTPUT"
          else
            echo "run_docker=false" >> "$GITHUB_OUTPUT"
            echo 'docker_matrix={"service":[]}' >> "$GITHUB_OUTPUT"
          fi

          if [[ "$K8S_CHANGED" == "true" ]]; then
            echo "run_k8s=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_k8s=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$SHARED_MODULES" == "true" ]]; then
            echo "run_shared_modules=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_shared_modules=false" >> "$GITHUB_OUTPUT"
          fi

  services-test:
    name: ${{ matrix.service }} 테스트
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_tests == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.test_matrix) }}

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: gradlew에 실행 권한 부여
        run: chmod +x ./${{ matrix.service }}/gradlew

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 테스트
        run: cd ${{ matrix.service }} && ./gradlew test jacocoTestVerification --no-daemon --build-cache

      - name: 테스트 리포트 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-report
          path: ${{ matrix.service }}/build/reports/tests/test/

  services-docker-build:
    name: ${{ matrix.service }} Docker 빌드
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_docker == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.docker_matrix) }}

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 빌드 검증
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  k8s-validate:
    name: K8s 매니페스트 검증
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_k8s == 'true'
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: kubectl 설치
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: kubeconform 설치
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: K8s 매니페스트 검증
        run: |
          find k8s k8s-cd \( -name '*.yml' -o -name '*.yaml' \) | while read f; do
            echo "Validating $f..."
            kubeconform -strict -summary "$f" || exit 1
          done

  shared-modules-test:
    name: 공유 모듈 테스트
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_shared_modules == 'true'
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v3

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 공유 모듈 테스트
        run: |
          for module in hoppingmall-common hoppingmall-cache hoppingmall-dlq hoppingmall-idempotency hoppingmall-outbox; do
            if [ -d "$module" ] && [ -f "$module/build.gradle.kts" ]; then
              echo "Testing $module..."
              if [ -f "$module/gradlew" ]; then
                chmod +x "$module/gradlew"
                cd "$module" && ./gradlew test --no-daemon --build-cache && cd ..
              else
                ./gradlew -p "$module" test --no-daemon --build-cache
              fi
            fi
          done

  final-check:
    name: CI 최종 검증
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - services-test
      - services-docker-build
      - k8s-validate
      - shared-modules-test
    if: always()
    steps:
      - name: 모든 선행 job 결과 확인
        run: |
          check_result() {
            local name="$1"
            local result="$2"

            echo "${name}=${result}"

            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              exit 1
            fi
          }

          check_result "detect-changes" "${{ needs.detect-changes.result }}"
          check_result "services-test" "${{ needs.services-test.result }}"
          check_result "services-docker-build" "${{ needs.services-docker-build.result }}"
          check_result "k8s-validate" "${{ needs.k8s-validate.result }}"
          check_result "shared-modules-test" "${{ needs.shared-modules-test.result }}"
