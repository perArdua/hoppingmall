name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  monolith-test:
    name: Monolith н…ҢмҠӨнҠё
    runs-on: ubuntu-latest
    steps:
      - name: мҶҢмҠӨ мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v3

      - name: gradlewм—җ мӢӨн–ү к¶Ңн•ң л¶Җм—¬
        run: chmod +x ./gradlew

      - name: JDK 21 м„Өм •
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: н…ҢмҠӨнҠё л°Ҹ м»ӨлІ„лҰ¬м§Җ кІҖмҰқ
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification --no-daemon --build-cache --quiet

      - name: м»ӨлІ„лҰ¬м§Җ м—…лЎңл“ң
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests

  services-test:
    name: ${{ matrix.service }} н…ҢмҠӨнҠё
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - notification-service
          - order-service
          - payment-service
          - product-service
          - user-service

    steps:
      - name: мҶҢмҠӨ мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v3

      - name: gradlewм—җ мӢӨн–ү к¶Ңн•ң л¶Җм—¬
        run: chmod +x ./${{ matrix.service }}/gradlew

      - name: JDK 21 м„Өм •
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: н…ҢмҠӨнҠё
        run: cd ${{ matrix.service }} && ./gradlew test --no-daemon --build-cache

      - name: н…ҢмҠӨнҠё лҰ¬нҸ¬нҠё м—…лЎңл“ң
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-report
          path: ${{ matrix.service }}/build/reports/tests/test/

  services-docker-build:
    name: ${{ matrix.service }} Docker л№Ңл“ң
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - notification-service
          - order-service
          - payment-service
          - product-service
          - user-service

    steps:
      - name: мҶҢмҠӨ мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v3

      - name: Docker л№Ңл“ң кІҖмҰқ
        run: docker build -t ${{ matrix.service }}:ci-test ./${{ matrix.service }}

  final-check:
    name: CI мөңмў… кІҖмҰқ
    runs-on: ubuntu-latest
    needs:
      - monolith-test
      - services-test
      - services-docker-build
    if: always()
    steps:
      - name: лӘЁл“  м„ н–ү job кІ°кіј нҷ•мқё
        run: |
          echo "monolith-test=${{ needs.monolith-test.result }}"
          echo "services-test=${{ needs.services-test.result }}"
          echo "services-docker-build=${{ needs.services-docker-build.result }}"

          if [ "${{ needs.monolith-test.result }}" != "success" ]; then
            exit 1
          fi

          if [ "${{ needs.services-test.result }}" != "success" ]; then
            exit 1
          fi

          if [ "${{ needs.services-docker-build.result }}" != "success" ]; then
            exit 1
          fi
